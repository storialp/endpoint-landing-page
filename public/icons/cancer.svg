<svg width="75" height="75" viewBox="0 0 527 441" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    path, line {
      transform-origin: center;
    }
    
    .cell-body {
      animation: cell-flow 20s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .dash {
      animation: dash-flow-intense 10s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .dash:nth-child(1) { animation-delay: -1s; }
    .dash:nth-child(2) { animation-delay: -2s; }
    .dash:nth-child(3) { animation-delay: -3s; }
    .dash:nth-child(4) { animation-delay: -4s; }
    .dash:nth-child(5) { animation-delay: -5s; }
    .dash:nth-child(6) { animation-delay: -6s; }
    .dash:nth-child(7) { animation-delay: -7s; }
    .dash:nth-child(8) { animation-delay: -8s; }
    .dash:nth-child(9) { animation-delay: -9s; }
    .dash:nth-child(10) { animation-delay: -10s; }
    
    .outer-line {
      animation: outer-line-flow 25s infinite ease-in-out;
      transform-box: fill-box;
    }
    
    .outer-line:nth-child(1) { animation-delay: -8s; transform-origin: 85px 162px; }
    .outer-line:nth-child(2) { animation-delay: -16s; transform-origin: 120px 101px; }
    .outer-line:nth-child(3) { animation-delay: -4s; transform-origin: 438px 124px; }
    
    .blob {
      animation: blob-flow-intense 15s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .blob:nth-child(1) { animation-delay: -3s; }
    .blob:nth-child(2) { animation-delay: -6s; }
    .blob:nth-child(3) { animation-delay: -9s; }
    .blob:nth-child(4) { animation-delay: -12s; }
    
    .connected-line {
      animation: connected-line-flow 18s infinite ease-in-out;
      transform-box: fill-box;
    }
    
    .connected-line:nth-child(1) { animation-delay: -6s; transform-origin: 195px 285px; }
    .connected-line:nth-child(2) { animation-delay: -12s; transform-origin: 263px 197px; }
    .connected-line:nth-child(3) { animation-delay: -18s; transform-origin: 272px 108px; }
    
    @keyframes cell-flow {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      25% { transform: translate(1px, 1.5px) scale(1.005) rotate(0.3deg); }
      50% { transform: translate(-0.5px, 1px) scale(0.995) rotate(-0.3deg); }
      75% { transform: translate(-1px, -0.5px) scale(0.998) rotate(-0.2deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    
    @keyframes dash-flow-intense {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      20% { transform: translate(3px, 2px) scale(1.1) rotate(2deg); }
      40% { transform: translate(2px, -3px) scale(0.95) rotate(4deg); }
      60% { transform: translate(-3px, -2px) scale(0.9) rotate(-3deg); }
      80% { transform: translate(-2px, 3px) scale(1.05) rotate(-5deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    
    @keyframes outer-line-flow {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      33% { transform: translate(2px, 1.5px) rotate(0.8deg) scale(1.01); }
      66% { transform: translate(-1.5px, 1px) rotate(-0.8deg) scale(0.99); }
      100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    }
    
    @keyframes blob-flow-intense {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      15% { transform: translate(4px, 3px) scale(1.06, 0.94) rotate(1.5deg); }
      30% { transform: translate(5px, -2px) scale(1.04, 0.96) rotate(3deg); }
      45% { transform: translate(1px, -4px) scale(0.96, 1.04) rotate(1.5deg); }
      60% { transform: translate(-4px, -3px) scale(0.94, 1.06) rotate(-1.5deg); }
      75% { transform: translate(-5px, 2px) scale(0.96, 1.04) rotate(-3deg); }
      90% { transform: translate(-2px, 4px) scale(1.04, 0.96) rotate(-1.5deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    
    @keyframes connected-line-flow {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      25% { transform: translate(2px, 1px) rotate(1deg) scale(1.02); }
      50% { transform: translate(0px, 2px) rotate(-1deg) scale(0.98); }
      75% { transform: translate(-2px, 0px) rotate(-2deg) scale(1.01); }
      100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    }
  </style>
  
