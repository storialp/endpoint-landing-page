<svg width="75" height="75" viewBox="0 0 472 432" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    path, line {
      transform-origin: center;
    }
    
    .cell-body {
      animation: cell-flow 20s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .inner-element {
      animation: inner-flow-intense 12s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .inner-element:nth-child(1) { animation-delay: -2s; }
    .inner-element:nth-child(2) { animation-delay: -5s; }
    .inner-element:nth-child(3) { animation-delay: -8s; }
    .inner-element:nth-child(4) { animation-delay: -3s; }
    
    .connected-group {
      animation: group-flow 25s infinite ease-in-out;
      transform-box: fill-box;
    }
    
    .connected-group-1 { transform-origin: 342px 390px; }
    .connected-group-2 { transform-origin: 417px 325px; }
    .connected-group-3 { transform-origin: 60px 121px; }
    .connected-group-4 { transform-origin: 87px 242px; }
    .connected-group-5 { transform-origin: 92px 355px; }
    .connected-group-6 { transform-origin: 206px 402px; }
    .connected-group-7 { transform-origin: 392px 91px; }
    .connected-group-8 { transform-origin: 440px 208px; }
    .connected-group-9 { transform-origin: 188px 81px; }
    .connected-group-10 { transform-origin: 292px 30px; }
    
    .connected-group:nth-child(even) { animation-delay: -5s; }
    .connected-group:nth-child(3n) { animation-delay: -10s; }
    .connected-group:nth-child(3n+1) { animation-delay: -15s; }
    
    .feature {
      animation: feature-flow-intense 14s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .feature:nth-child(1) { animation-delay: -3s; }
    .feature:nth-child(2) { animation-delay: -7s; }
    .feature:nth-child(3) { animation-delay: -10s; }
    
    @keyframes cell-flow {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      25% { transform: translate(1px, 1.5px) scale(1.005) rotate(0.3deg); }
      50% { transform: translate(-0.5px, 1px) scale(0.995) rotate(-0.3deg); }
      75% { transform: translate(-1px, -0.5px) scale(0.998) rotate(-0.2deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    
    @keyframes inner-flow-intense {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      15% { transform: translate(3px, 2px) scale(1.05) rotate(1deg); }
      30% { transform: translate(4px, -1px) scale(1.03) rotate(2deg); }
      45% { transform: translate(1px, -3px) scale(0.97) rotate(1deg); }
      60% { transform: translate(-3px, -2px) scale(0.95) rotate(-1deg); }
      75% { transform: translate(-4px, 1px) scale(0.97) rotate(-2deg); }
      90% { transform: translate(-2px, 3px) scale(1.02) rotate(-1deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    
    @keyframes group-flow {
      0% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(1px, 0.8px) rotate(0.4deg); }
      66% { transform: translate(-0.8px, 0.5px) rotate(-0.4deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    
    @keyframes feature-flow-intense {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      20% { transform: translate(2px, 1px) scale(1.08, 0.92) rotate(1deg); }
      40% { transform: translate(1px, -2px) scale(1.05, 0.95) rotate(2deg); }
      60% { transform: translate(-2px, -1px) scale(0.92, 1.08) rotate(-1deg); }
      80% { transform: translate(-1px, 2px) scale(0.95, 1.05) rotate(-2deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
  </style>
  
