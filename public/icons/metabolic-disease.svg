<svg width="75" height="75" viewBox="0 0 380 378" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    path, line, circle {
      transform-origin: center;
    }
    
    .main-body {
      animation: body-flow 25s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .cristae {
      animation: cristae-flow 20s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .dash {
      animation: dash-flow-intense 8s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .dash:nth-child(1) { animation-delay: -1s; }
    .dash:nth-child(2) { animation-delay: -2s; }
    .dash:nth-child(3) { animation-delay: -3s; }
    .dash:nth-child(4) { animation-delay: -4s; }
    .dash:nth-child(5) { animation-delay: -5s; }
    .dash:nth-child(6) { animation-delay: -6s; }
    .dash:nth-child(7) { animation-delay: -7s; }
    .dash:nth-child(8) { animation-delay: -0.5s; }
    .dash:nth-child(9) { animation-delay: -1.5s; }
    .dash:nth-child(10) { animation-delay: -2.5s; }
    
    .blob {
      animation: blob-flow-intense 15s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .blob:nth-child(1) { animation-delay: -5s; }
    .blob:nth-child(2) { animation-delay: -10s; }
    
    .circle {
      animation: circle-float 12s infinite ease-in-out;
      transform-box: fill-box;
      transform-origin: center;
    }
    
    .circle:nth-child(1) { animation-delay: -4s; }
    .circle:nth-child(2) { animation-delay: -8s; }
    .circle:nth-child(3) { animation-delay: -2s; }
    
    @keyframes body-flow {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      25% { transform: translate(0.8px, 1px) scale(1.003) rotate(0.2deg); }
      50% { transform: translate(-0.4px, 0.8px) scale(0.997) rotate(-0.2deg); }
      75% { transform: translate(-0.8px, -0.4px) scale(0.999) rotate(-0.1deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    
    @keyframes cristae-flow {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      20% { transform: translate(1.5px, 0.8px) scale(1.005) rotate(0.3deg); }
      40% { transform: translate(0.8px, -1px) scale(0.995) rotate(0.2deg); }
      60% { transform: translate(-1px, -0.8px) scale(0.997) rotate(-0.2deg); }
      80% { transform: translate(-0.8px, 1px) scale(1.003) rotate(-0.3deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    
    @keyframes dash-flow-intense {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      20% { transform: translate(3px, 2px) scale(1.05) rotate(2deg); }
      40% { transform: translate(1.5px, -3px) scale(0.95) rotate(4deg); }
      60% { transform: translate(-2px, -2px) scale(0.97) rotate(-3deg); }
      80% { transform: translate(-2px, 3px) scale(1.03) rotate(-5deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    
    @keyframes blob-flow-intense {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      15% { transform: translate(3px, 2px) scale(1.04, 0.96) rotate(1deg); }
      30% { transform: translate(3.5px, -1.5px) scale(1.03, 0.97) rotate(2deg); }
      45% { transform: translate(0.8px, -3px) scale(0.97, 1.03) rotate(1deg); }
      60% { transform: translate(-3px, -2px) scale(0.96, 1.04) rotate(-1deg); }
      75% { transform: translate(-3.5px, 1.5px) scale(0.97, 1.03) rotate(-2deg); }
      90% { transform: translate(-1.5px, 3px) scale(1.03, 0.97) rotate(-1deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    
    @keyframes circle-float {
      0% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(2px, 1.5px) scale(1.07); }
      50% { transform: translate(0px, 3px) scale(0.97); }
      75% { transform: translate(-2px, 0.8px) scale(1.03); }
      100% { transform: translate(0, 0) scale(1); }
    }
  </style>
  
